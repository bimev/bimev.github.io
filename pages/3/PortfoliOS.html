<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="PortfoliOS.css">
    <title>PortfoliOS</title>
</head>
<body>
    <main class="main">
        <div class="desktop">
            <div class="trashcan">
                <b>TRASH</b>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="taskbar">
            <div class="left">
                <div class="winbtn">
                <img class="winbtn_ico" src="/resources/PortfoliOSicoTEST.png" alt="winico">
                <div class="winbtn_content">
                    <div class="winbtn_left">
                        <div class="winbtn_left_top">
                            <div class="left_user">
                                <div class="left_usericon"><i class="fa-regular fa-user" style="color: rgb(255, 255, 255);"></i></div>
                                <div class="left_username">Admin</div>
                                <div class="left_user_content">
                                </div>
                            </div>
                            <div class="left_mostused">
                                <h4>Most used apps</h4>
                                <div class="mostused_start">
                                    <p class="mostused_startico"><i class="fa-solid fa-lightbulb" style="color: rgb(255, 255, 255);"></i></p>
                                    <p>Start</p>
                                </div>
                                <div class="mostused_calculator">
                                    <p class="mostused_calculatorico"><i class="fa-solid fa-calculator" style="color: rgb(255, 255, 255);"></i></p>
                                    <p>Calculator</p>
                                </div>
                                <div class="mostused_maps">
                                    <p class="mostused_mapsico"><i class="fa-solid fa-location-dot" style="color: rgb(255, 255, 255);"></i></p>
                                    <p>Maps</p>
                                </div>
                                <div class="mostused_people">
                                    <p class="mostused_peopleico"><i class="fa-solid fa-people-group" style="color: rgb(255, 255, 255);"></i></p>
                                    <p>People</p>
                                </div>
                                <div class="mostused_alarmclock">
                                    <p class="mostused_alarmclockico"><i class="fa-regular fa-alarm-clock" style="color: rgb(255, 255, 255);"></i></p>
                                    <p>Alarm clock</p>
                                </div>
                            </div>
                        </div>
                        <div class="winbtn_left_bottom">
                            <div class="left_resourcemanager">
                                <p><i class="fa-regular fa-folder-open" style="color: rgb(255, 255, 255);"></i></p>
                                <p>Resource Manager</p>
                                <p><i class="fa-solid fa-angle-right" style="color: rgb(255, 255, 255);"></i></p>
                            </div>
                            <div class="left_settings">
                                <p><i class="fa-solid fa-gears" style="color: rgb(255, 255, 255);"></i></p>
                                <p>Settings</p>
                            </div>
                            <div class="left_power">
                                <p><i class="fa-solid fa-power-off" style="color: rgb(255, 255, 255);"></i></p>
                                <p>Power</p>
                            </div>
                            <div class="left_apps">
                                <p><i class="fa-solid fa-list" style="color: rgb(255, 255, 255);"></i></p>
                                <p>Apps</p>
                            </div>
                        </div>
                    </div>
                    <div class="winbtn_middle">
                        <p>Trending</p>
                        <div class="middle_trending">
                            <div class="trending_calender">
                                <div class="trending_calender_content">
                                    <i class="fa-regular fa-calendar-days" style="color: rgb(255, 255, 255); font-size: 50px;"></i>
                                    <p>Calender</p>
                                </div>
                            </div>
                            <div class="trending_mail">
                                <div class="trending_mail_content">
                                    <p>Mail</p>
                                    <i class="fa-solid fa-envelope" style="color: rgb(255, 255, 255); font-size: 20px;"></i>
                                </div>
                            </div>
                            <div class="trending_browser">
                                <div class="trending_browser_content">
                                    <p>Browser</p>
                                    <i class="fa-brands fa-edge-legacy" style="color: rgb(255, 255, 255); font-size: 20px;"></i>
                                </div>
                            </div>
                            <div class="trending_photos">
                                <div class="trending_photos_content">
                                    <p>Photos</p>
                                    <i class="fa-solid fa-camera" style="color: rgb(255, 255, 255); font-size: 50px;"></i>
                                </div>
                            </div>
                            <div class="trending_weather">
                                <div class="trending_weather_content">
                                    <p>Weather</p>
                                    <i class="fa-solid fa-cloud-rain" style="color: rgb(255, 255, 255); font-size: 50px;"></i>
                                </div>
                            </div>
                            <div class="trending_phone">
                                <div class="trending_phone_content">
                                    <p>Phone</p>
                                    <i class="fa-solid fa-mobile" style="color: rgb(255, 255, 255); font-size: 50px;"></i>

                            </div>
                            <div class="trending_forums">
                                <div class="trending_forums_content">
                                    <p>Forums</p>
                                    <i class="fa-brands fa-discourse" style="color: rgb(255, 255, 255); font-size: 50px;"></i>
                                </div>
                            </div>
                            <div class="trending_shop">
                                <div class="trending_shop_content">
                                    <p>Shop</p>
                                    <i class="fa-solid fa-cart-shopping" style="color: rgb(255, 255, 255); font-size: 50px;"></i>
                                </div>
                            </div>
                            <div class="trending_call">
                                <div class="trending_call_content">
                                    <p>Calls</p>
                                    <i class="fa-solid fa-phone" style="color: rgb(255, 255, 255); font-size: 20px;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="winbtn_right">
                        <P>Entertainment</P>
                        <div class="right_entertainment">
                            <div class="entertainment_games">Games</div>
                            <div class="entertainment_music">Music</div>
                            <div class="entertainment_movies">Movies</div>
                            <div class="entertainment_cards">Cards</div>
                            <div class="entertainment_holder1">holder1</div>
                            <div class="entertainment_news">News</div>
                            <div class="entertainment_economy">Economy</div>
                            <div class="entertainment_holder2">holder2</div>
                            <div class="entertainment_editor">Editor</div>
                            <div class="entertainment_useless">Useless</div>
                        </div>
                    </div>
                </div>
                </div>
                <div class="search">
                    <img class="search_ico" src="/resources/searchico.png" alt="searchico">
                </div>
                <div class="desktopmana">
                    <img class="desktopmana_ico" src="/resources/desktopmanaico.png">
                </div>
                <div class="edge">
                    <img class="edge_ico" src="/resources/edgeico.png">
                </div>
                <div class="resources">
                    <img class="resources_ico" src="/resources/resourceico.png">
                </div>
                <div class="store">
                    <img class="store_ico" src="/resources/storeico.png">
                </div>
            </div>
            <div class="right">
                <div class="up">
                    <img class="up_ico" src="/resources/upico.png">
                </div>
                <div class="internet">
                    <img class="internet_ico" src="/resources/internetico.png">
                </div>
                <div class="volume">
                    
                    <img class="volume_ico" src="/resources/volumeico.png">
                </div>
                <div class="timendate">
                    <div class="time">19:00</div>
                    <div class="date">23.2.2321</div>
                </div>
                <div class="news">

                </div>
            </div>
        </div>
